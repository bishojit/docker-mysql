# =============================================================================
# phpMyAdmin for Dokploy (Docker Compose) — fixes the 502 Bad Gateway.
# =============================================================================
# Diagnosis:
#   * Apache is healthy and listening on port 80 (your logs: "resuming normal
#     operations"). phpMyAdmin is NOT the problem.
#   * You already set Container Port = 80 in the Domain UI. Correct.
#   * The page went 404 -> Bad Gateway, which means Dokploy's Traefik router
#     EXISTS but Traefik cannot reach the container.
#   * Cause: the service was not attached to the external `dokploy-network`,
#     so Traefik (which lives on that network) has no route to it -> 502.
#
# THE FIX: attach `dokploy-network` (below) and redeploy. Let the Dokploy
# Domain UI manage the Traefik labels — do NOT add your own here or they clash.
# =============================================================================

services:
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    restart: unless-stopped
    environment:
      # Where your MySQL lives. If MySQL is ALSO a Dokploy service, put its
      # service name here and add its network below (see notes at the bottom).
      PMA_HOST: ${PMA_HOST:?set PMA_HOST to your MySQL host/service}
      PMA_PORT: ${PMA_PORT:-3306}
      PMA_ARBITRARY: ${PMA_ARBITRARY:-0}
      # Must match the public URL, or redirects/assets break behind TLS.
      PMA_ABSOLUTE_URI: "https://ta360-phpmyadmin-sjwdgb-b79596-200-97-175-42.sslip.io/"
      UPLOAD_LIMIT: ${PMA_UPLOAD_LIMIT:-64M}
      HIDE_PHP_VERSION: 1
    volumes:
      # Enables TLS to MySQL (fixes "SSL is not being used"). For a git-based
      # Dokploy deploy this file ships with the repo; if you paste compose into
      # the Dokploy editor instead, create it via Advanced -> Mounts (File Mount)
      # at path /etc/phpmyadmin/config.user.inc.php with the same contents.
      - ./config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    networks:
      - dokploy-network          # <-- THE FIX: lets Traefik reach this container
    security_opt:
      - no-new-privileges:true   # kept (safe); do NOT use `cap_drop: ALL` here —
                                 # it caused the config.secret.inc.php errors.
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\",80)?0:1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dokploy-network:
    external: true

# -----------------------------------------------------------------------------
# Reaching your MySQL (do this once the 502 is gone and you try to log in):
#
#   * MySQL is another Dokploy service  -> set PMA_HOST to its service name.
#     If it is also on `dokploy-network`, that's enough. Otherwise add the
#     shared/project network here and under the service, e.g.:
#         networks: [dokploy-network, my-db-net]
#       networks:
#         my-db-net: { external: true, name: <that project's network> }
#
#   * MySQL on the host / another server -> set PMA_HOST to its IP/hostname
#     (the host must accept remote connections from this container).
# -----------------------------------------------------------------------------
